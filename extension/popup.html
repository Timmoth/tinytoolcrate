<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>tinytoolcrate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="ttc-header">
      <div class="ttc-header-row">
        <button id="theme-toggle" type="button" class="ttc-theme-toggle" aria-label="Toggle light/dark mode">
          Dark
        </button>
        <div class="ttc-title">tinytoolcrate</div>
      </div>
      <div class="ttc-subtitle">compact tools, in your toolbar</div>
    </header>
    <main class="ttc-main">
      <section class="ttc-selectors">
        <label class="ttc-label">
          <span>Category</span>
          <select id="category-select" class="ttc-select"></select>
        </label>
        <label class="ttc-label">
          <span>Tool</span>
          <select id="tool-select" class="ttc-select"></select>
        </label>
      </section>
      <section id="tool-container" class="ttc-tool-container"></section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
  </html>
